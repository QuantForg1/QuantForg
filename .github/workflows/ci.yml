# QuantForg CI — continuous integration pipeline
# Runs on every push and pull request to main/develop.
#
# Dependency notes:
# - pyproject.toml is Poetry-managed ([tool.poetry]). poetry.lock is committed;
#   setup-python may use poetry cache when lockfile is present.
# - Jobs install Poetry after setup-python, then poetry install --no-interaction.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  POETRY_VERSION: "1.8.5"
  APP_ENV: testing
  SECRET_KEY: test-secret-key-that-is-long-enough-for-validation-32chars
  LOG_LEVEL: WARNING
  LOG_FORMAT: console
  LOG_JSON: "false"
  DEBUG: "true"

jobs:
  design-governance:
    name: Design Governance Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify Design Bible documents (ADR-0022)
        run: bash scripts/check-design-governance.sh

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            poetry.lock
            pyproject.toml

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check app core tests

      - name: Black check
        run: poetry run black --check app core tests

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            poetry.lock
            pyproject.toml

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: MyPy
        run: poetry run mypy app core

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            poetry.lock
            pyproject.toml

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        run: poetry run pytest -m "unit or not integration" --cov-fail-under=60

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quantforg
          POSTGRES_PASSWORD: quantforg_test
          POSTGRES_DB: quantforg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantforg -d quantforg_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      RUN_INTEGRATION: "1"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: quantforg
      POSTGRES_PASSWORD: quantforg_test
      POSTGRES_DB: quantforg_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            poetry.lock
            pyproject.toml

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run integration tests
        run: poetry run pytest -m integration --cov-fail-under=0
