# Force Railway to use the Dockerfile image and our entrypoint.
# Do NOT set healthcheckPath here — a failing platform healthcheck marks the
# deployment unhealthy and the edge returns x-railway-fallback: true (502).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/docker-entrypoint.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
