# Force Railway to use the Dockerfile image and our entrypoint.
# Without this, a dashboard Start Command / Nixpacks override can leave
# Uvicorn "running" in logs while the edge proxies to the wrong process/port.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/docker-entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
